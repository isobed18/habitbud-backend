services:
  redis:
    image: redis:7-alpine
    container_name: habitbud_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - habitbud_network

  web:
    build: .
    container_name: habitbud_web
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - ALLOWED_HOSTS=*
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379/0
      - CREATE_DEMO_USERS=true
    depends_on:
      - redis
    networks:
      - habitbud_network

volumes:
  redis_data:
  media_data:

networks:
  habitbud_network:
    driver: bridge
